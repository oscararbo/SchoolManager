<form [formGroup]="formLogin" (ngSubmit)="iniciarSesion()" class="w-100 vstack gap-3" autocomplete="on">
    <!-- Error feedback -->
    @if (errorMessage()) {
        <div class="mb-3">
            <div class="alert alert-danger" role="alert">{{ errorMessage() }}</div>
        </div>
    }

    <!-- Form title -->
    <div class="border-bottom pb-2">
        <h2 class="h4 text-center mb-0">Iniciar sesión</h2>
    </div>

    <!-- Email input -->
    <app-text-input
        id="emailInput"
        type="email"
        label="Correo electrónico"
        placeholder="name@example.com"
        autocomplete="email"
        formControlName="email"
        [errorMessage]="controlErrorMessage('email')"
        [showValidState]="mostrarErrores">
    </app-text-input>

    <!-- Password input -->
    <app-text-input
        id="passwordInput"
        type="password"
        label="Contraseña"
        placeholder="Password"
        autocomplete="current-password"
        formControlName="password"
        [errorMessage]="controlErrorMessage('password')"
        [showValidState]="mostrarErrores">
    </app-text-input>

    <!-- Submit action -->
    <div class="d-grid mt-2">
        <button
        class="btn btn-dark"
        type="submit"
        [disabled]="cargando()">
            @if (cargando()) {
                <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                Cargando...
            } @else {
                Entrar
            }
        </button>
    </div>
</form>
