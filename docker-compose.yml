services:
  postgres:
    image: postgres:17-alpine
    container_name: school-postgres
    environment:
      POSTGRES_DB: schooldb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d schooldb"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  back:
    build:
      context: .
      dockerfile: Back/Dockerfile
    container_name: school-back
    ports:
      - "5014:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=schooldb;Username=postgres;Password=postgres
      SeedAdmin__Nombre: Administrador
      SeedAdmin__Correo: admin@prueba.com
      SeedAdmin__Contrasena: Prueba1
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/swagger/index.html"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  front:
    build:
      context: .
      dockerfile: Front/Dockerfile
    container_name: school-front
    depends_on:
      back:
        condition: service_healthy
    ports:
      - "4200:80"

volumes:
  postgres-data:
