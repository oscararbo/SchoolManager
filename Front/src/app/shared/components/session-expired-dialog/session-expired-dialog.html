<div class="session-expired-overlay" role="dialog" aria-modal="true" aria-labelledby="expiredTitle">
    <div class="card session-expired-card shadow-lg border-0">
        <div class="card-body text-center p-5">
            <div class="mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor"
                    class="text-warning" viewBox="0 0 16 16">
                    <path d="M8 3.5a.5.5 0 0 0-1 0V9a.5.5 0 0 0 .252.434l3.5 2a.5.5 0 0 0 .496-.868L8 8.71z"/>
                    <path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16m7-8A7 7 0 1 1 1 8a7 7 0 0 1 14 0"/>
                </svg>
            </div>
            <h5 class="card-title fw-bold" id="expiredTitle">Sesión expirada</h5>
            <p class="card-text text-secondary mb-4">
                Tu sesión ha caducado o no es válida. Por favor, inicia sesión de nuevo.
            </p>
            <button class="btn btn-primary px-4" type="button" (click)="aceptar()">
                Aceptar
            </button>
        </div>
    </div>
</div>
