name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend:
    name: Backend Build and Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore backend
        run: dotnet restore Back/Back.Api.csproj

      - name: Build backend
        run: dotnet build Back/Back.Api.csproj --configuration Release --no-restore

      - name: Run backend tests
        run: dotnet test Back.Tests/Back.Tests.csproj --configuration Release --no-build --verbosity normal

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: Front
        run: npm install

      - name: Build frontend
        working-directory: Front
        run: npm run build -- --configuration production
