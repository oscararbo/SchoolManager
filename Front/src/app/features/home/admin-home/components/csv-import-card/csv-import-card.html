<div class="csv-import-card card shadow-sm border-0 h-100">
    @if (cargando) {
        <div class="csv-import-overlay" aria-live="polite" aria-busy="true">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Importando...</span>
            </div>
        </div>
    }

    <div class="card-body position-relative">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h6 class="card-title mb-0">{{ titulo }}</h6>
            <button class="btn btn-sm btn-outline-secondary" type="button" (click)="onDescargarPlantilla()" [disabled]="cargando">
                Descargar plantilla
            </button>
        </div>
        <p class="text-secondary small">{{ descripcion }}</p>
        <input #fileInput class="form-control form-control-sm mb-2" type="file" accept=".csv"
            (change)="onFileChange($event)" [disabled]="cargando">
        <div class="d-flex justify-content-between align-items-center gap-2">
            <small class="text-secondary text-truncate">{{ archivoNombre() }}</small>
            <button class="btn btn-sm btn-primary flex-shrink-0" type="button" [disabled]="botonImportarDeshabilitado()"
                (click)="onImportar()">
                {{ textoBotonImportar() }}
            </button>
        </div>
    </div>
</div>
