<section class="vstack gap-3">
    <header>
        <p class="text-secondary mb-0">Gestion completa del centro escolar.</p>
    </header>

    <app-admin-sections-nav
        [seccionActiva]="seccionActiva()"
        (seccionChange)="cambiarSeccion($event)">
    </app-admin-sections-nav>

    @if (seccionActiva() === 'estadisticas') {
        <app-admin-stats-view></app-admin-stats-view>
    }

    @if (seccionActiva() === 'gestion') {
        <app-admin-management-view
            (dataChanged)="onManagementDataChanged()">
        </app-admin-management-view>
    }
</section>
